<!DOCTYPE html>
<html lang="en" data-bg-theme="dark" data-dot-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="Assets/dot.svg">
    <title>BlinkCamp - Free Online Eye Muscles And Vision Training Exercises</title>
    <meta name="description" content="BlinkCamp Is A Free Online Software That Helps Individuals Acheive Great Results For Eye Treatment And Visual Improvement. Try It Out Now!">
    <meta name="keywords" content="eye training exercises,online eye exercises, vision exercises,eye strain exercises,
    online eye trainer, BlinkCamp, lazy eye exercises">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HS9SH7F8BT"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-HS9SH7F8BT');
    </script>
</head>
<body>
    <button id="menu-toggle" title="Toggle menu">✕</button>

    <div class="game">
        <div class="dot" id="dot"></div>
    </div>

    <div class="ui-controls" id="ui-controls">
        <div class="controls-top">
            <div class="arrow-group">
                <div class="arrow left" title="Previous routine">◀</div>
                <div class="arrow right" title="Next routine">▶</div>
                <div class="changeroutine">Change Routine</div>
            </div>
            <div class="routinename">Routine Name</div>

            <label class="slider-item" title="Movement speed">
                Speed
                <input id="velocityslider" type="range" min="0.25" max="25" value="3" step="0.001">
            </label>
            <label class="slider-item" title="Dot size">
                Size
                <input id="sizeslider" type="range" min="0.01" max="10" value="2" step="0.001">
            </label>
        </div>

        <div class="controls-bottom">
            <div class="bottom-left">
                <label for="bg-theme" title="Background color">BG</label>
                <select id="bg-theme">
                    <option value="dark">Dark</option>
                    <option value="amber">Amber</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                    <option value="purple">Purple</option>
                </select>
                <label for="dot-theme" title="Dot color">Dot</label>
                <select id="dot-theme">
                    <option value="dark">Dark</option>
                    <option value="amber">Amber</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                    <option value="purple">Purple</option>
                </select>

                <label class="vsync-label" title="Synchronize with display refresh rate">
                    <input id="vsync-toggle" type="checkbox" checked> V-Sync
                </label>
                <label class="fps-cap-label" id="fps-cap-container">
                    FPS
                    <input id="fps-slider" type="range" min="15" max="240" value="60" step="1" title="Max FPS when V-Sync is off">
                    <span id="fps-value">60</span>
                </label>
            </div>

            <div class="social-group">
                <a href="https://discord.gg/Fea2vU8JFC" target="_blank" title="Join our Discord">
                    <img src="Assets/discord-icon.svg" class="socialicon" alt="Discord">
                </a>
                <a href="https://github.com/ErezShahaf/BlinkCamp" target="_blank" title="View on GitHub">
                    <img src="Assets/github-icon.svg" class="socialicon" alt="GitHub">
                </a>
            </div>
        </div>
    </div>
</body>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="./Engine/GameLoop.js" type="module"></script>
<script src="./Game.js" type="module"></script>
</html>
